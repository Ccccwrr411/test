# Grafana Dashboard 自动配置 (Provisioning)
apiVersion: 1

providers:
  - name: NekoCafé
    orgId: 1
    folder: NekoCafé
    type: file
    disableDeletion: true
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
