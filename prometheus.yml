# NekoCafé Prometheus 采集配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nekocafe
    env: dev

# Alertmanager (本地不启用，生产环境通过 AlertmanagerConfig CRD)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ===== Reservation Service =====
  - job_name: reservation
    metrics_path: /metrics
    static_configs:
      - targets:
          - nekocafe-reservation:8080
        labels:
          service: reservation
          team: backend
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

  # ===== Member Service =====
  - job_name: member
    metrics_path: /metrics
    static_configs:
      - targets:
          - nekocafe-member:8080
        labels:
          service: member
          team: backend
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\d+'
        replacement: '${1}'

  # ===== PostgreSQL Exporter (if enabled) =====
  - job_name: postgres
    static_configs:
      - targets:
          - nekocafe-postgres:9187
        labels:
          service: postgresql
          team: data

  # ===== Redis Exporter (if enabled) =====
  - job_name: redis
    static_configs:
      - targets:
          - nekocafe-redis:9121
        labels:
          service: redis
          team: data

  # ===== Prometheus Self =====
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
          team: platform
