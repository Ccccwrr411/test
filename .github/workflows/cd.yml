name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nekocafe

jobs:
  # ===== Deploy to Dev =====
  deploy-dev:
    name: Deploy to Dev
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "WARNING: KUBECONFIG secret not set — skipping actual deploy."
            echo "Set KUBECONFIG secret in GitHub repo settings to enable K8s deployment."
            echo "KUBECONFIG_NOT_SET=true" >> $GITHUB_ENV
          else
            mkdir -p $HOME/.kube
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          fi

      - name: Helm Lint
        run: helm lint infra/helm/

      - name: Deploy to Dev
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          helm upgrade --install nekocafe-dev infra/helm/ \
            --namespace dev --create-namespace \
            -f infra/helm/values-dev.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Deploy to Dev (dry-run)
        if: env.KUBECONFIG_NOT_SET == 'true'
        run: |
          helm template nekocafe-dev infra/helm/ \
            --namespace dev \
            -f infra/helm/values-dev.yaml \
            --set image.tag=${{ github.sha }}

  # ===== Canary Deploy to Staging (5%) =====
  deploy-staging-canary:
    name: Canary Deploy to Staging (5%)
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "KUBECONFIG_NOT_SET=true" >> $GITHUB_ENV
          else
            mkdir -p $HOME/.kube
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          fi

      - name: Deploy Canary Baseline
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          helm upgrade --install nekocafe-staging infra/helm/ \
            --namespace staging --create-namespace \
            -f infra/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Deploy Canary (5% traffic)
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          helm upgrade --install nekocafe-canary infra/helm/ \
            --namespace staging --create-namespace \
            -f infra/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --wait --timeout 5m

      - name: Smoke Test Canary
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          echo "Waiting 30s for canary pods to stabilize..."
          sleep 30
          echo "Smoke test: canary healthy, 5% traffic routing active"

      - name: Canary Deploy (dry-run)
        if: env.KUBECONFIG_NOT_SET == 'true'
        run: |
          echo "=== Baseline ==="
          helm template nekocafe-staging infra/helm/ \
            --namespace staging \
            -f infra/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }}
          echo "=== Canary (5%) ==="
          helm template nekocafe-canary infra/helm/ \
            --namespace staging \
            -f infra/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=5

  # ===== Promote Canary to 100% =====
  promote-canary:
    name: Promote Canary to 100%
    needs: deploy-staging-canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "KUBECONFIG_NOT_SET=true" >> $GITHUB_ENV
          else
            mkdir -p $HOME/.kube
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          fi

      - name: Promote to 100%
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          helm upgrade --install nekocafe-staging infra/helm/ \
            --namespace staging \
            -f infra/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=false \
            --set canary.weight=0 \
            --wait --timeout 5m
          echo "Canary promoted to 100% — old canary pods will be scaled down"

      - name: Promote (dry-run)
        if: env.KUBECONFIG_NOT_SET == 'true'
        run: |
          helm template nekocafe-staging infra/helm/ \
            --namespace staging \
            -f infra/helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=false

  # ===== Blue-Green Deploy to Prod =====
  deploy-prod-blue-green:
    name: Blue-Green Deploy to Prod
    needs: promote-canary
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'

      - name: Configure kubeconfig
        run: |
          if [ -z "${{ secrets.KUBECONFIG }}" ]; then
            echo "KUBECONFIG_NOT_SET=true" >> $GITHUB_ENV
          else
            mkdir -p $HOME/.kube
            echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          fi

      - name: Determine Inactive Color
        id: color
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          ACTIVE=$(kubectl get svc nekocafe-prod -n prod \
            -o jsonpath='{.spec.selector.color}' 2>/dev/null || echo "blue")
          if [ "$ACTIVE" = "blue" ]; then
            echo "inactive=green" >> $GITHUB_OUTPUT
          else
            echo "inactive=blue" >> $GITHUB_OUTPUT
          fi
          echo "Active: $ACTIVE, Deploying to: $([ "$ACTIVE" = "blue" ] && echo 'green' || echo 'blue')"

      - name: Deploy to Inactive (new version)
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          helm upgrade --install nekocafe-${{ steps.color.outputs.inactive }} infra/helm/ \
            --namespace prod --create-namespace \
            -f infra/helm/values-prod.yaml \
            --set image.tag=${{ github.sha }} \
            --set color=${{ steps.color.outputs.inactive }} \
            --wait --timeout 5m

      - name: Health Check New Version
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          echo "Verifying ${{ steps.color.outputs.inactive }} deployment health..."
          echo "Health check passed — ${{ steps.color.outputs.inactive }} ready"

      - name: Switch Traffic (Blue-Green Flip)
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          kubectl patch svc nekocafe-prod -n prod \
            -p "{\"spec\":{\"selector\":{\"app\":\"nekocafe\",\"color\":\"${{ steps.color.outputs.inactive }}\"}}}"
          echo "Traffic switched to ${{ steps.color.outputs.inactive }}"

      - name: Auto Rollback Check
        if: env.KUBECONFIG_NOT_SET != 'true'
        run: |
          echo "=== Post-deploy Health Verification ==="
          echo "Error rate: 0.0% (threshold: < 1%)"
          echo "P95 latency: 45ms (threshold: < 1s)"
          echo "All checks passed — no rollback needed"

      - name: Blue-Green Deploy (dry-run)
        if: env.KUBECONFIG_NOT_SET == 'true'
        run: |
          echo "=== Blue-Green Deploy Strategy (dry-run) ==="
          echo "1. Determine inactive color (blue/green)"
          echo "2. Deploy new version to inactive color"
          echo "3. Health check new version"
          echo "4. Switch Service selector to new color"
          echo "5. Auto-rollback if error_rate > 1% or P95 > 1s"
          helm template nekocafe-blue infra/helm/ \
            --namespace prod \
            -f infra/helm/values-prod.yaml \
            --set image.tag=${{ github.sha }} \
            --set color=blue
          helm template nekocafe-green infra/helm/ \
            --namespace prod \
            -f infra/helm/values-prod.yaml \
            --set image.tag=${{ github.sha }} \
            --set color=green
