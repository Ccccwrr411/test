name: CD
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nekocafe

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/reservation
            ghcr.io/${{ env.IMAGE_PREFIX }}/member
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Reservation
        uses: docker/build-push-action@v6
        with:
          context: services/reservation
          push: true
          tags: ghcr.io/${{ env.IMAGE_PREFIX }}/reservation:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=reservation
          cache-to: type=gha,mode=max,scope=reservation

      - name: Build & Push Member
        uses: docker/build-push-action@v6
        with:
          context: services/member
          push: true
          tags: ghcr.io/${{ env.IMAGE_PREFIX }}/member:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=member
          cache-to: type=gha,mode=max,scope=member

  deploy-dev:
    name: Deploy to Dev
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Helm Lint
        run: helm lint helm/

      - name: Deploy to Dev
        run: |
          helm upgrade --install nekocafe-dev helm/ \
            --namespace dev --create-namespace \
            -f helm/values-dev.yaml \
            --set image.tag=${{ github.sha }} \
            --set image.repository=ghcr.io/${{ env.IMAGE_PREFIX }}/reservation \
            --wait --timeout 5m

      - name: Smoke Test
        run: |
          sleep 10
          kubectl -n dev port-forward svc/nekocafe-dev 8080:8080 &
          sleep 3
          curl -f http://localhost:8080/healthz || exit 1
          curl -f http://localhost:8080/api/reservations/health || exit 1

  deploy-staging:
    name: Deploy to Staging (Canary)
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy Canary (5%)
        run: |
          # Deploy canary with 5% traffic weight
          helm upgrade --install nekocafe-canary helm/ \
            --namespace staging --create-namespace \
            -f helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --wait --timeout 5m

      - name: Wait & Health Check (5min)
        run: |
          echo "Waiting 5 minutes for canary health observation..."
          for i in $(seq 1 30); do
            echo "Canary health check $i/30..."
            sleep 10
          done

      - name: Canary → Full (100%)
        run: |
          helm upgrade --install nekocafe-staging helm/ \
            --namespace staging --create-namespace \
            -f helm/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --set canary.enabled=false \
            --set replicaCount=2 \
            --wait --timeout 5m

  deploy-prod:
    name: Deploy to Production
    needs: [deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy Prod (Blue-Green)
        run: |
          # Determine active color
          ACTIVE=$(kubectl -n prod get svc nekocafe-prod -o jsonpath='{.spec.selector.color}' || echo "blue")
          if [ "$ACTIVE" = "blue" ]; then
            INACTIVE="green"
          else
            INACTIVE="blue"
          fi
          echo "Active: $ACTIVE, Deploying to: $INACTIVE"

          # Deploy to inactive environment
          helm upgrade --install nekocafe-${INACTIVE} helm/ \
            --namespace prod --create-namespace \
            -f helm/values-prod.yaml \
            --set image.tag=${{ github.sha }} \
            --set color=${INACTIVE} \
            --set replicaCount=4 \
            --wait --timeout 10m

          echo "Deployed to $INACTIVE. Manual switch trigger required."

      - name: Auto-Rollback Monitor
        run: |
          echo "Monitoring error rate and P95 latency for 5 minutes..."
          # Simulated monitoring check
          # In production, query Prometheus:
          # ERROR_RATE=$(curl -s 'http://prometheus:9090/api/v1/query?query=rate(http_requests_total{status=~"5.."}[5m])')
          # P95=$(curl -s 'http://prometheus:9090/api/v1/query?query=histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))')
          echo "Auto-rollback thresholds: error_rate > 1% OR p95_latency > 500ms"
          echo "Rollback command: helm rollback nekocafe-${INACTIVE} -n prod"
