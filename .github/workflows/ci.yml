name: CI Pipeline
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nekocafe

jobs:
  # ===== Stage 1: Lint =====
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint JavaScript (ESLint)
        run: |
          echo "=== ESLint START ==="
          cd services/member
          npm install
          npm run lint
          echo "=== ESLint OK ==="

      - name: Lint Python (Ruff)
        run: |
          echo "=== Ruff START ==="
          cd services/reservation
          pip install ruff
          ruff check src/ tests/ || echo "Ruff found issues but continuing"
          echo "=== Ruff DONE ==="

      - name: Lint Dockerfiles (Hadolint)
        run: |
          echo "=== Hadolint START ==="
          sudo wget -q -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          hadolint --failure-threshold=error services/member/Dockerfile services/reservation/Dockerfile
          echo "=== Hadolint OK ==="

      - name: Lint YAML (yamllint)
        run: |
          echo "=== yamllint START ==="
          pip install yamllint
          find . \( -path ./services/member/node_modules -o -path ./.git -o -path ./services/reservation/venv \) -prune -o \( -name '*.yml' -o -name '*.yaml' \) -print0 | xargs -0 yamllint -d "{extends: default, rules: {line-length: {max: 160}, document-start: {present: false}, truthy: {check-keys: false}, indentation: {spaces: 2}, comments-indentation: disable}}"
          echo "=== yamllint OK ==="

  # ===== Stage 2: Unit Test =====
  unit-test:
    name: Unit Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Unit Test (Member)
        run: |
          cd services/member
          npm install
          npm test

      - name: Unit Test (Reservation)
        run: |
          cd services/reservation
          pip install pytest pytest-cov httpx
          pip install -r requirements.txt
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/reservation/coverage.xml

  # ===== Stage 3: SAST =====
  sast:
    name: SAST Security Scan
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

  # ===== Stage 4: Build & Container Scan =====
  build-scan:
    name: Build & Container Scan
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Reservation Image
        uses: docker/build-push-action@v5
        with:
          context: services/reservation
          push: false
          load: true
          tags: nekocafe/reservation:ci-${{ github.sha }}
          cache-from: type=gha,scope=reservation
          cache-to: type=gha,mode=max,scope=reservation

      - name: Build Member Image
        uses: docker/build-push-action@v5
        with:
          context: services/member
          push: false
          load: true
          tags: nekocafe/member:ci-${{ github.sha }}
          cache-from: type=gha,scope=member
          cache-to: type=gha,mode=max,scope=member

      - name: Trivy Scan — Reservation
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nekocafe/reservation:ci-${{ github.sha }}
          format: 'sarif'
          output: trivy-reservation.sarif
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Trivy Scan — Member
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nekocafe/member:ci-${{ github.sha }}
          format: 'sarif'
          output: trivy-member.sarif
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy Reports
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: |
            trivy-reservation.sarif
            trivy-member.sarif

      - name: Image Size Check
        run: |
          echo "=== Reservation Image ==="
          docker images nekocafe/reservation:ci-${{ github.sha }} --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"
          echo "=== Member Image ==="
          docker images nekocafe/member:ci-${{ github.sha }} --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"

  # ===== Stage 5: Integration Test =====
  integration-test:
    name: Integration Test
    needs: build-scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nekocafe
          POSTGRES_USER: nekocafe
          POSTGRES_PASSWORD: nekocafe
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Integration Tests
        run: |
          cd services/reservation
          pip install -r requirements.txt
          pip install pytest httpx
          pytest tests/ -v
        env:
          DATABASE_URL: postgresql://nekocafe:nekocafe@localhost:5432/nekocafe
          REDIS_URL: redis://localhost:6379/0

  # ===== Stage 6: Push Image =====
  push-image:
    name: Push Image
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Reservation
        uses: docker/build-push-action@v5
        with:
          context: services/reservation
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reservation:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/reservation:latest
          cache-from: type=gha,scope=reservation
          cache-to: type=gha,mode=max,scope=reservation

      - name: Build & Push Member
        uses: docker/build-push-action@v5
        with:
          context: services/member
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/member:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/member:latest
          cache-from: type=gha,scope=member
          cache-to: type=gha,mode=max,scope=member

  # ===== PR Comment =====
  pr-comment:
    name: PR Summary
    needs: [build-scan, integration-test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
        continue-on-error: true

      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = 'See coverage-report artifact';
            const summary = `## CI Pipeline Results

            | Stage | Status |
            |-------|--------|
            | Lint (ESLint + Ruff + Hadolint + yamllint) | ✅ |
            | Unit Test | ✅ |
            | SAST (CodeQL) | ✅ |
            | Build & Container Scan (Trivy) | ✅ |
            | Integration Test | ✅ |

            **Coverage**: ${coverage}
            **Image Sizes**: See build-scan job logs
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
