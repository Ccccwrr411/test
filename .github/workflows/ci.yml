name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nekocafe

jobs:
  # ===== Stage 1: Lint =====
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint JavaScript (ESLint)
        run: |
          cd services/member
          npm install
          npx eslint src/ tests/

      - name: Lint Python (Ruff)
        run: |
          cd services/reservation
          pip install ruff
          ruff check src/ tests/

      - name: Lint Dockerfiles (Hadolint)
        run: |
          sudo wget -q -O /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          hadolint --failure-threshold=error \
            services/member/Dockerfile \
            services/reservation/Dockerfile

      - name: Lint YAML (yamllint)
        run: |
          pip install yamllint
          cat > .yamllint << 'EOF'
          extends: default
          rules:
            line-length:
              max: 300
            document-start: disable
            truthy: disable
            indentation: disable
            comments-indentation: disable
            braces: disable
            empty-lines: disable
          EOF
          yamllint \
            .github/workflows/ci.yml \
            .github/workflows/cd.yml \
            docker-compose.yml \
            .pre-commit-config.yaml \
            infra/k8s-manifests/deployments.yaml \
            infra/helm/Chart.yaml \
            infra/helm/values.yaml \
            infra/helm/values-dev.yaml \
            infra/helm/values-staging.yaml \
            infra/helm/values-prod.yaml \
            infra/observability/prometheus.yml \
            infra/observability/rules/alerts.yml

  # ===== Stage 2: Unit Test =====
  unit-test:
    name: Unit Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Unit Test (Member)
        run: |
          cd services/member
          npm install
          npm test

      - name: Unit Test (Reservation)
        run: |
          cd services/reservation
          pip install pytest pytest-cov httpx
          pip install -r requirements.txt
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/reservation/coverage.xml

  # ===== Stage 3: SAST =====
  sast:
    name: SAST Security Scan
    needs: unit-test
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: CodeQL Init
        uses: github/codeql-action/init@v4
        with:
          languages: javascript, python

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v4

  # ===== Stage 4: Build & Container Scan =====
  build-scan:
    name: Build & Container Scan
    needs: sast
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Reservation Image
        uses: docker/build-push-action@v5
        with:
          context: services/reservation
          push: false
          load: true
          tags: nekocafe/reservation:ci-${{ github.sha }}
          cache-from: type=gha,scope=reservation
          cache-to: type=gha,mode=max,scope=reservation

      - name: Build Member Image
        uses: docker/build-push-action@v5
        with:
          context: services/member
          push: false
          load: true
          tags: nekocafe/member:ci-${{ github.sha }}
          cache-from: type=gha,scope=member
          cache-to: type=gha,mode=max,scope=member

      - name: Trivy Scan — Reservation
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nekocafe/reservation:ci-${{ github.sha }}
          format: 'sarif'
          output: trivy-reservation.sarif
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Trivy Scan — Member
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nekocafe/member:ci-${{ github.sha }}
          format: 'sarif'
          output: trivy-member.sarif
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Debug — List SARIF files
        run: |
          echo "=== Looking for SARIF files ==="
          find . -name "*.sarif" -type f 2>/dev/null || true
          ls -la *.sarif 2>/dev/null || echo "No SARIF files in root"

      - name: Upload Trivy Reports
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-reservation.sarif
          category: trivy-reservation
        continue-on-error: true

      - name: Upload Trivy Reports (Member)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-member.sarif
          category: trivy-member
        continue-on-error: true

      - name: Image Size Check
        run: |
          echo "=== Reservation Image ==="
          docker images nekocafe/reservation:ci-${{ github.sha }} \
            --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"
          echo "=== Member Image ==="
          docker images nekocafe/member:ci-${{ github.sha }} \
            --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}"

  # ===== Stage 5: Integration Test =====
  integration-test:
    name: Integration Test
    needs: build-scan
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nekocafe
          POSTGRES_USER: nekocafe
          POSTGRES_PASSWORD: nekocafe
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Integration Tests
        run: |
          cd services/reservation
          pip install -r requirements.txt
          pip install pytest httpx
          pytest tests/ -v
        env:
          DATABASE_URL: postgresql://nekocafe:nekocafe@localhost:5432/nekocafe
          REDIS_URL: redis://localhost:6379/0

  # ===== Stage 6: Push Image =====
  push-image:
    name: Push Image
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image prefix
        id: image
        run: |
          owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${owner_lower}/nekocafe" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Reservation
        uses: docker/build-push-action@v5
        with:
          context: services/reservation
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/reservation:${{ github.sha }}
            ${{ steps.image.outputs.prefix }}/reservation:latest
          cache-from: type=gha,scope=reservation
          cache-to: type=gha,mode=max,scope=reservation

      - name: Build & Push Member
        uses: docker/build-push-action@v5
        with:
          context: services/member
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/member:${{ github.sha }}
            ${{ steps.image.outputs.prefix }}/member:latest
          cache-from: type=gha,scope=member
          cache-to: type=gha,mode=max,scope=member

  # ===== PR Comment =====
  pr-comment:
    name: PR Summary
    needs: [build-scan, integration-test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
        continue-on-error: true

      - name: Post PR Comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const summary = `## CI Pipeline Results

            | Stage | Status |
            |-------|--------|
            | Lint (ESLint + Ruff + Hadolint + yamllint) | ✅ |
            | Unit Test | ✅ |
            | SAST (CodeQL) | ✅ |
            | Build & Container Scan (Trivy) | ✅ |
            | Integration Test | ✅ |

            **Coverage**: See coverage-report artifact
            **Image Sizes**: See build-scan job logs
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
