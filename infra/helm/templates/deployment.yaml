{{- range $name, $svc := (dict "reservation" .Values.reservation "member" .Values.member) }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: nekocafe
    service: {{ $name }}
    env: {{ $.Values.global.environment }}
    {{- if $.Values.canary.enabled }}
    canary: "true"
    {{- end }}
    color: {{ $.Values.color | default "blue" }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: nekocafe
      service: {{ $name }}
  template:
    metadata:
      labels:
        app: nekocafe
        service: {{ $name }}
        env: {{ $.Values.global.environment }}
    spec:
      containers:
      - name: {{ $name }}
        image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
        imagePullPolicy: {{ $svc.image.pullPolicy }}
        ports:
        - containerPort: {{ $svc.service.targetPort }}
          name: http
        {{- with $svc.health.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with $svc.health.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml $svc.resources | nindent 10 }}
{{- end }}
{{- end }}
