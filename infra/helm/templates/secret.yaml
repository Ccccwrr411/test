apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  # NOTE: In production, use External Secrets Operator or Vault instead of hardcoding.
  # These values are placeholders — actual secrets injected via CI/CD.
  DATABASE_URL: "postgresql://nekocafe:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/nekocafe"
  REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379/0"
  JWT_SECRET: "{{ .Values.postgresql.auth.password | default "change-me-in-production" }}"
