apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  ENVIRONMENT: "{{ .Values.global.environment }}"
  LOG_LEVEL: "{{ .Values.observability.logging.level }}"
  LOG_FORMAT: "{{ .Values.observability.logging.format }}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "{{ .Values.observability.tracing.endpoint }}"
  OTEL_TRACES_SAMPLER: "parentbased_traceidratio"
  OTEL_TRACES_SAMPLER_ARG: "{{ .Values.observability.tracing.samplingRate }}"
  REDIS_HOST: "{{ .Release.Name }}-redis-master"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "{{ .Release.Name }}-postgresql"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "nekocafe"
