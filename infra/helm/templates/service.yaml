{{- range $name, $svc := (dict "reservation" .Values.reservation "member" .Values.member) }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: nekocafe
    service: {{ $name }}
    env: {{ $.Values.global.environment }}
spec:
  type: ClusterIP
  ports:
  - port: {{ $svc.service.port }}
    targetPort: {{ $svc.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: nekocafe
    service: {{ $name }}
{{- end }}
{{- end }}
