apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nekocafe
  namespace: {{ .Release.Namespace }}
  labels:
    app: nekocafe
    env: {{ .Values.global.environment }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    {{- if .Values.canary.enabled }}
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "{{ .Values.canary.weight }}"
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      {{- if .Values.reservation.enabled }}
      - path: /api/reservations
        pathType: Prefix
        backend:
          service:
            name: reservation
            port:
              number: {{ .Values.reservation.service.port }}
      {{- end }}
      {{- if .Values.member.enabled }}
      - path: /api/members
        pathType: Prefix
        backend:
          service:
            name: member
            port:
              number: {{ .Values.member.service.port }}
      {{- end }}
