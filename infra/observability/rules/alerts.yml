groups:
  - name: nekocafe
    rules:
      # Alert 1: High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 1%"
          description: "Service {{ $labels.service }} error rate is {{ $value | humanizePercentage }}"

      # Alert 2: High P95 latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency > 1s"
          description: "Service {{ $labels.service }} P95 latency is {{ $value }}s"

      # Alert 3: Pod restarts
      - alert: PodFrequentRestarts
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod restarting frequently"
          description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in 15m"
