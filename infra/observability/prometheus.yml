global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "reservation"
    static_configs:
      - targets: ["reservation:8080"]
    metrics_path: /metrics

  - job_name: "member"
    static_configs:
      - targets: ["member:8081"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
