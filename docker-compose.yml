version: "3.9"

services:
  reservation:
    build:
      context: services/reservation
      dockerfile: Dockerfile
    container_name: nekocafe-reservation
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  member:
    build:
      context: services/member
      dockerfile: Dockerfile
    container_name: nekocafe-member
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8081/healthz', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
