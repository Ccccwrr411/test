# Grafana 数据源自动配置 (Provisioning)
apiVersion: 1

datasources:
  # ===== Prometheus (Metrics) =====
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: nekocafe-prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: nekocafe-jaeger

  # ===== Jaeger (Traces) =====
  - name: Jaeger
    type: jaeger
    access: proxy
    orgId: 1
    uid: nekocafe-jaeger
    url: http://jaeger:16686
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: nekocafe-loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: service.name
            value: service
        customQuery: true
        query: '{service="${service}"}'

  # ===== Loki (Logs) - Optional =====
  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: nekocafe-loki
    url: http://loki:3100
    editable: false
    isDefault: false
    jsonData:
      derivedFields:
        - datasourceUid: nekocafe-jaeger
          matcherRegex: '"traceId":"(\w+)"'
          name: traceID
          url: '$${__value.raw}'
